# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - cloud-task-manager-api-pk

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'tests/CloudBackend.Tests/**'
      - '.github/workflows/main_cloud-task-manager-api-pk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore backend/CloudBackend.csproj

      - name: Build
        run: dotnet build backend/CloudBackend.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/CloudBackend.Tests/CloudBackend.Tests.csproj --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish backend/CloudBackend.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A7AC986B1AFF4A4BA0CE6E60D4FA6EA2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FD8971E8F2D141ABB6B9281D82006B70 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_50B06A60378B4487961E9719B8081C2A }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cloud-task-manager-api-pk'
          slot-name: 'Production'
          package: .
