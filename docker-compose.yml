version: "3.9"

services:

  # Warstwa Prezentacji (React)
  frontend:
    build: ./frontend
    container_name: cloud-frontend
    ports:
      - "8080:80"
    networks:
      - cloud-network
    depends_on:
      - backend

  # Warstwa Logiki (.NET 9)
  backend:
    build: ./backend
    container_name: cloud-backend
    ports:
      - "8081:8080" # Mapujemy port 8080 kontenera (standard .NET 9) na 8081 hosta
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      # UWAGA: Hasło w tekście jawnym zostanie zabezpieczone później, ale dla celów demonstracyjnych jest tutaj umieszczone.
      # W praktyce należy używać zmiennych środowiskowych lub menedżerów sekretów.
      - ConnectionStrings__DefaultConnection=Server=cloud-db;Database=CloudAppDb;User Id=sa;Password=StrongPassword123!;TrustServerCertificate=True
    networks:
      - cloud-network
    depends_on:
      - cloud-db

  # Warstwa Danych (SQL Edge)
  cloud-db:
    image: mcr.microsoft.com/azure-sql-edge
    container_name: cloud-db
    environment:
      SA_PASSWORD: "StrongPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    networks:
      - cloud-network
    # Trwałość danych: named volume gwarantuje, że dane przeżyją "docker compose down"
    # (bez flagi -v). Nawet po "docker compose down -v" dane są odtwarzane dzięki
    # migracjom EF Core uruchamianym przy starcie backendu.
    volumes:
      - sqlserver-data:/var/opt/mssql

networks:
  cloud-network:
    driver: bridge

# Named volume – Docker zarządza nim niezależnie od cyklu życia kontenera.
# Dane nie zginą po "docker compose down" (tylko "docker compose down -v" je usuwa).
volumes:
  sqlserver-data:
    name: cloud-app-sqlserver-data